version: '3.9'

# docker-compose -f docker-compose.test.yml up -d
# Used by E2E test suite only

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: securefile-postgres-test
    environment:
      POSTGRES_DB: securefile_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    container_name: securefile-redis-test
    ports:
      - '6380:6379'
    tmpfs:
      - /data
